<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Notes Management System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                radial-gradient(circle at top left,#4f46e5,#312e81),
                linear-gradient(135deg,#0f172a,#1e293b);
            padding:20px;
            overflow:hidden;
        }

        .container{
            width:100%;
            max-width:550px;
            background:rgba(255,255,255,0.96);
            backdrop-filter:blur(10px);
            padding:60px 50px;
            border-radius:28px;
            text-align:center;
            box-shadow:
                0 25px 50px rgba(0,0,0,0.25),
                0 10px 20px rgba(0,0,0,0.12);
            border:1px solid rgba(255,255,255,0.4);
        }

        h1{
            color:#0f172a;
            font-size:38px;
            font-weight:700;
            line-height:1.3;
            margin-bottom:40px;
            letter-spacing:-0.5px;
        }

        .btn{
            width:220px;
            padding:16px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#2563eb,#4f46e5);
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:all 0.35s ease;
            margin:10px 0;
            box-shadow:0 8px 20px rgba(37,99,235,0.25);
        }

        .btn:hover{
            transform:translateY(-4px);
            box-shadow:0 15px 30px rgba(37,99,235,0.35);
        }

        .btn:active{
            transform:translateY(0);
        }

        a{
            text-decoration:none;
        }

        center{
            position:fixed;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            background:#dcfce7;
            color:#166534;
            padding:12px 20px;
            border-radius:10px;
            font-weight:600;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            z-index:1000;
        }

        @media(max-width:600px){

            .container{
                padding:40px 25px;
            }

            h1{
                font-size:28px;
            }

            .btn{
                width:100%;
            }
        }
    </style>
</head>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <center>{{ message }}</center>
    {% endfor %}
  {% endif %}
{% endwith %}

<body>

    <div class="container">

        <h1>Simple Notes Management System</h1>

        <a href="{{ url_for('register') }}">
            <button class="btn">Register</button>
        </a>

        <br>

        <a href="{{ url_for('login') }}">
            <button class="btn">Login</button>
        </a>

    </div>

</body>
</html>
