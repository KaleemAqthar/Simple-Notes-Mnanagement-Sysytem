{% extends 'dashboard.html' %}
{%block title%}<title>view Notes</title>{% endblock %}


{% block addcss %}
<link rel="stylesheet"href="{{url_for('static',filename='addnotes.css')}}">
{% endblock %}

{% block content %}
{% with messages = get_flashed_messages() %}
  {% if messages %}
    
    {% for message in messages %}
     <center> {{ message }}</center>
    {% endfor %}
   
  {% endif %}
{% endwith %}



<div class="note-container">

    <h2>view Note</h2>

    <form action="/viewnotes" method="POST">

        <div class="form-group">
            <label for="title">Title</label>

            <input
                type="text"
                id="title"
                name="title"
               value="{{notesdata[1]}}" readonly>
        </div>

        <div class="form-group">

            <label for="description">Description</label>

            <textarea
                id="description"
                name="description"
                rows="8"
             readonly>{{notesdata[2]}}</textarea>
            

        </div>



    </form>

</div>

{% endblock %}
