<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left,#4f46e5,#312e81),
        linear-gradient(135deg,#0f172a,#1e293b);
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.98);
    padding:40px;
    border-radius:24px;
    text-align:center;
    box-shadow:
        0 25px 50px rgba(0,0,0,0.25),
        0 10px 20px rgba(0,0,0,0.12);
}

h2{
    color:#0f172a;
    font-size:30px;
    font-weight:700;
    margin-bottom:12px;
}

p{
    color:#64748b;
    font-size:15px;
    margin-bottom:25px;
    line-height:1.6;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #dbe2ea;
    border-radius:14px;
    background:#f8fafc;
    font-size:18px;
    text-align:center;
    letter-spacing:3px;
    margin-bottom:20px;
    transition:all 0.3s ease;
}

input:focus{
    outline:none;
    background:#fff;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,0.12);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#4f46e5);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.3s ease;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(37,99,235,0.30);
}

.resend{
    margin-top:20px;
    color:#64748b;
    font-size:14px;
}

.resend a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.resend a:hover{
    text-decoration:underline;
}

center{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#dcfce7;
    color:#166534;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
    box-shadow:0 5px 15px rgba(0,0,0,0.12);
    z-index:1000;
}

@media(max-width:480px){

    .container{
        padding:30px 20px;
    }

    h2{
        font-size:24px;
    }
}
</style>

</head>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    
    {% for message in messages %}
     <center> {{ message }}</center>
    {% endfor %}
   
  {% endif %}
{% endwith %}
<body>

    <div class="container">
        <h2>OTP Verification</h2>
        <p>Enter the OTP sent to your email</p>

        <form method="POST">
            <input type="text" name="otp" placeholder="Enter OTP" maxlength="7" required>

            <button type="submit">Verify OTP</button>
        </form>

        <div class="resend">
            Didn't receive OTP?
            <a href="#">Resend OTP</a>
        </div>
    </div>

</body>
</html>
